<html lang="en">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SDG Tourism Vocab — Mobile</title>
<meta name="description" content="Short practice for tourism students (A2→C2). Full-pool quizzes, CSV export, persistent progress."/>

<style>

  header{display:flex;justify-content:space-between;align-items:center;gap:12px}
  h1{font-size:20px;margin:0}
  .lead{font-size:13px;color:var(--muted);margin-top:6px}
  .controls{background:var(--card);border-radius:12px;padding:12px;box-shadow:0 6px 20px rgba(6,22,48,0.06);margin-top:12px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}

  .big{font-size:22px;font-weight:700}
  .art{width:72px;height:72px;margin-bottom:8px;display:block}
  .jp{color:#0b6b4f;font-weight:700;margin-top:8px}
  .sentence{font-size:13px;color:var(--muted);margin-top:6px}

  .option{display:block;padding:12px;border-radius:12px;border:1px solid #eef6ff;background:#fff;font-size:16px;text-align:left;cursor:pointer}
  .option.disabled{opacity:0.6;cursor:default}
  .correct{background:#e6ffef;border-color:#bdeecf}
  .wrong{background:#fff0f2;border-color:#ffc9d1}
  .small{font-size:13px;color:var(--muted)}

  .progress-inline{font-size:13px;color:#0b84ff;margin-left:8px}
  .toast{position:fixed;left:50%;top:12%;transform:translateX(-50%);background:#0b84ff;color:#fff;padding:8px 14px;border-radius:8px;z-index:2000;box-shadow:0 6px 18px rgba(6,22,48,0.12)}

  @media (max-width:720px){ .controls{flex-direction:column;align-items:stretch} .art{width:60px;height:60px} }

</head>
<body>
<canvas id="confetti-canvas"></canvas>

<div class="app" id="app">
  <header>
    <div>
      <h1 id="title">SDG Tourism Vocab — Mobile</h1>
      <div class="lead">Short, fun practice for tourism students (A2→C2). Tap a card to reveal translation & example.</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end">
      <div style="display:flex;gap:8px">
        <input id="studentName" type="text" placeholder="Student name (optional)" aria-label="Student name" style="min-width:160px"/>
      </div>
      <div style="display:flex;gap:8px">
        <button id="enBtn">EN</button>
        <button id="jaBtn">日本語</button>
      </div>
    </div>
  </header>

  <div class="controls" role="region" aria-label="Controls">
    <select id="levelSelect" aria-label="CEFR level" title="CEFR level">
      <option value="A2">A2</option><option value="B1">B1</option><option value="B2">B2</option><option value="C1">C1</option><option value="C2">C2</option>
    </select>

    <select id="sdgSelect" aria-label="SDG filter" title="Filter by SDG">
      <option value="all">All SDGs</option>
    </select>

    <select id="modeSelect" aria-label="Mode" title="Mode">
      <option value="flashcard">Flashcards</option>
      <option value="quiz">Quick Quiz</option>
    </select>

    <button id="startBtn" class="primary">Start</button>

    <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
      <div class="small">XP: <strong id="xp">0</strong></div>
      <div id="badges" aria-live="polite"></div>
      <span class="progress-inline" id="levelProgress" title="Level progress"></span>
      <button id="exportBtn">Export</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>

  <div id="cardArea" class="card center" style="min-height:320px;display:flex;flex-direction:column;justify-content:center;align-items:center">
    <div id="welcome" class="center">
      <div class="big">Ready to practice?</div>
      <div class="small" style="margin-top:8px">Choose level & mode then tap Start. Tap the card to reveal translations.</div>
    </div>
  </div>

  <footer id="footer">SDG icon = SDG number. Works offline; share the HTML file by AirDrop or LMS.</footer>
</div>

const STORAGE_KEY = 'sdg_mobile_icons_confetti_v1';
function safeParse(json){
  try{ return JSON.parse(json); } catch(e){ return null; }
}
function saveState(state){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){ console.warn('saveState failed', e); } }
function nowIso(){ return (new Date()).toISOString(); }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]] } return a; }
function escapeCsv(s){ if(s==null) return ''; const str = String(s).replace(/"/g,'""'); return /["\n,]/.test(str) ? `"${str}"` : str; }

/* render status */

/* -------------------------
   Persistent queue helpers
   ------------------------- */
function getWords(level, sdgFilter){
  const arr = (vocab[level] || []).slice();
  if (sdgFilter && sdgFilter !== 'all') return arr.filter(w => String(w.sdg) === String(sdgFilter));
  return arr;
}

function ensureLevelQueue(level){
  state.levelQueues = state.levelQueues || {};
  const pool = getWords(level, 'all');
  const ids = pool.map(w=>w.id);
  let q = state.levelQueues[level] || [];
  // remove ids no longer present and keep order for remaining
  q = q.filter(id => ids.includes(id));
  // add missing ids shuffled at the end
  const missing = ids.filter(id => !q.includes(id));
  if (missing.length) q = q.concat(shuffle(missing));
  // init if empty
  if (q.length === 0 && ids.length > 0) q = shuffle(ids.slice());
  state.levelQueues[level] = q;
  saveState(state);
  return q.slice();
}

/* pop random id from queue restricted to poolIds */
function popNextFromQueue(level, poolIds){
  state.levelQueues = state.levelQueues || {};
  let q = state.levelQueues[level] || [];
  if (poolIds && poolIds.length){
    // available ids in queue that are in the current pool
    const avail = q.filter(id => poolIds.includes(id));
    if (avail.length === 0){
      // rebuild: shuffle poolIds and reattach
      const newIds = shuffle(poolIds.slice());
      q = q.filter(id => !poolIds.includes(id)).concat(newIds);
      state.levelQueues[level] = q;
      saveState(state);
    }
    const renewed = state.levelQueues[level].filter(id => poolIds.includes(id));
    if (renewed.length === 0) return null;
    const idx = Math.floor(Math.random() * renewed.length);
    const id = renewed[idx];
    // remove from persistent queue
    const removeIndex = state.levelQueues[level].indexOf(id);
    if (removeIndex !== -1) state.levelQueues[level].splice(removeIndex,1);
    saveState(state);
    return id;
  } else {
    if (q.length === 0) return null;
    const idx = Math.floor(Math.random() * q.length);
    const id = q[idx];
    state.levelQueues[level].splice(idx,1);
    saveState(state);
    return id;
  }
}

/* -------------------------
   Session start and card rendering
   ------------------------- */
function startSession(){
  const level = levelSelect.value;
  const sdg = sdgSelect.value;
  const mode = modeSelect.value;
  if (!state.unlocked.includes(level)){
    alert(level + ' is locked. Master earlier levels to unlock.');
    return;
  }
  const pool = getWords(level, sdg);
  if (pool.length === 0){
    alert('No words for that selection');
    return;
  }
  ensureLevelQueue(level);
  const poolIds = pool.map(w=>w.id);
  const items = [];
  let nextId;
  // gather until queue exhausted for this pool (randomized pops)
  while ((nextId = popNextFromQueue(level, poolIds)) !== null){
    const it = pool.find(w=>w.id === nextId);
    if (it) items.push(it);
  }
  if (items.length === 0) items.push(...shuffle(pool.slice()));
  session.mode = mode;
  session.items = items;
  session.index = 0;
  session.consumed = new Set();
  showingBack = false;
  showCard();
}

/* show current card */
function showCard(){
  const item = session.items[session.index];
  if (!item){ cardArea.innerHTML = `<div class="big">No items</div>`; return; }

  // defensive: remove from persistent queue if left
  if (!session.consumed.has(item.id)){
    const level = item.id.split('_')[0];
    if (Array.isArray(state.levelQueues[level])){
      const idx = state.levelQueues[level].indexOf(item.id);
      if (idx !== -1) state.levelQueues[level].splice(idx,1);
      saveState(state);
    }
    session.consumed.add(item.id);
  }

  const art = item.img ? `<div class="art" style="font-size:40px">${item.img}</div>` : '';
  const sdgHtml = sdgIcon(item.sdg);
  cardArea.innerHTML = `
    <div style="width:100%;padding:18px;display:flex;flex-direction:column;align-items:center">
      ${art}
      <div class="big" id="word">${escapeHtml(item.word)}</div>
      <div class="pos-row small" id="pos">${sdgHtml}<span>${escapeHtml(item.pos || '')}</span></div>
      <div id="back" style="display:none;width:100%;margin-top:12px">
        <div class="jp" id="jp">${escapeHtml(item.jp)}</div>
        <div class="sentence" id="sentence">${escapeHtml(item.sentence)}</div>
        <div class="actions">
          <button id="knowBtn" class="primary">I know</button>
          <button id="dontBtn" class="btn-ghost">I don't</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('knowBtn')?.addEventListener('click', ()=>markKnown(item));
  document.getElementById('dontBtn')?.addEventListener('click', ()=>markDont(item));
  const level = item.id.split('_')[0];
  document.getElementById('word').setAttribute('tabindex', '0');
  sessionInfoUpdate();
  if (session.mode === 'quiz') showQuizOptions(item);
  renderStatus();
}

function sessionInfoUpdate(){
  const total = session.items.length || 0;
  const idx = (session.index || 0) + 1;
  // show as small text in controls
  // (we already show progress in levelProgressEl)
}

/* minimal HTML escape */
function escapeHtml(s){ if(!s) return ''; return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* -------------------------
   Quiz options & click handling
   ------------------------- */
function showQuizOptions(item){
  const level = item.id.split('_')[0];
  const pool = (vocab[level] || []).filter(i => i.id !== item.id);
  // prefer same pos and sdg
  let candidates = pool.filter(p => p.pos === item.pos && p.sdg === item.sdg);
  if (candidates.length < 3) candidates = candidates.concat(pool.filter(p => p.pos === item.pos && p.sdg !== item.sdg));
  if (candidates.length < 3) candidates = candidates.concat(pool.filter(p => p.pos !== item.pos));
  // unique
  const uniq = []; const seen = new Set();
  for (const c of candidates){ if (!seen.has(c.id)){ seen.add(c.id); uniq.push(c); if (uniq.length >= 3) break; } }
  const distractors = uniq.slice(0,3);
  const options = shuffle([item, ...distractors]).slice(0, Math.min(4, (vocab[level]||[]).length));
  const optWrap = document.createElement('div'); optWrap.style.width = '100%'; optWrap.style.marginTop = '12px';
  optWrap.innerHTML = options.map((o,i) => {
    const label = o.def || o.jp || o.word || '';
    return `<button class="option" data-id="${o.id}" data-label="${escapeHtml(label)}">${escapeHtml(label)}</button>`;
  }).join('');
  cardArea.appendChild(optWrap);

  function disableOptions(){
    optWrap.querySelectorAll('.option').forEach(b => { b.disabled = true; b.classList.add('disabled'); });
  }

  optWrap.querySelectorAll('.option').forEach(btn => {
    btn.addEventListener('click', () => {
      disableOptions();
      const chosenId = btn.getAttribute('data-id');
      const choiceText = btn.textContent.trim();
      if (chosenId === item.id){
        btn.classList.add('correct');
        state.xp = (state.xp || 0) + 10;
        recordProgress(item, true, choiceText);
      } else {
        btn.classList.add('wrong');
        recordProgress(item, false, choiceText);
        // reveal back and show JP explanation
        const back = document.getElementById('back');
        if (back){
          back.style.display = 'block';
          showingBack = true;
          const jpEl = document.getElementById('jp'); if (jpEl) jpEl.textContent = item.jp || '';
          let expl = document.getElementById('jp-expl');
          if (!expl){
            expl = document.createElement('div');
            expl.id = 'jp-expl';
            expl.style.marginTop = '8px';
            expl.style.fontSize = '13px';
            expl.style.color = '#0b6b4f';
            expl.style.fontWeight = '700';
            back.appendChild(expl);
          }
          expl.textContent = `正解は「${item.jp || item.word}」です。`;
        }
      }
      // 4s delay then next
      setTimeout(() => {
        const explNode = document.getElementById('jp-expl');
        if (explNode && explNode.parentNode) explNode.parentNode.removeChild(explNode);
        session.index++;
        if (session.index >= session.items.length) finishSession();
        else showCard();
      }, 4000);
    });
  });
}

/* mark known/don't buttons (flashcards flow) */
function markKnown(item){
  recordProgress(item, true, 'I know');
  state.xp = (state.xp || 0) + 5;
  saveState(state);
  session.index++; if (session.index >= session.items.length) finishSession(); else showCard();
}
function markDont(item){
  recordProgress(item, false, "I don't");
  saveState(state);
  session.index++; if (session.index >= session.items.length) finishSession(); else showCard();
}

/* -------------------------
   Progress, awarding & logging
   ------------------------- */
function recordProgress(item, correct, choiceText){
  const id = item.id;
  const p = state.progress[id] || {seen:0,known:0,mastered:false};
  p.seen = (p.seen || 0) + 1;
  if (correct) p.known = (p.known || 0) + 1;
  if (p.known >= 2) p.mastered = true;
  state.progress[id] = p;

  const level = id.split('_')[0];
  state.correctAnswers = state.correctAnswers || {};
  if (correct){
    state.correctAnswers[level] = (state.correctAnswers[level] || 0) + 1;
  }

  // append answer event
  state.answers = state.answers || [];
  state.answers.push({
    ts: nowIso(),
    student: studentNameInput.value.trim() || '',
    level: level,
    sdg: item.sdg,
    id: id,
    word: item.word,
    choice: choiceText || '',
    correct: !!correct
  });

  const newlyAwarded = awardIfNeeded(item);
  saveState(state);
  renderStatus();
  if (newlyAwarded) triggerConfetti();
}

/* award & unlock at 20 correct (manual start) */
function awardIfNeeded(item){
  const level = item.id.split('_')[0];
  const words = vocab[level] || [];
  const mastered = words.filter(w => state.progress[w.id] && state.progress[w.id].mastered).length;
  const correctCount = (state.correctAnswers && state.correctAnswers[level]) ? state.correctAnswers[level] : 0;
  const MASTERY_REQUIRED = 20;
  if ((mastered >= MASTERY_REQUIRED || correctCount >= MASTERY_REQUIRED) && !state.badges.includes(level)){
    state.badges.push(level);
    const order = ["A2","B1","B2","C1","C2"];
    const idx = order.indexOf(level);
    if (idx >= 0 && idx < order.length-1){
      const next = order[idx+1];
      if (!state.unlocked.includes(next)) state.unlocked.push(next);
      showToast(`${level} badge earned! ${next} unlocked — select ${next} when you want to practice.`);
    } else {
      showToast(`${level} badge earned!`);
    }
    saveState(state);
    return true;
  }
  return false;
}

/* finish session */
function finishSession(){
  showToast('Session complete — great work!');
  cardArea.innerHTML = `<div class="big center">Nice! 🎉</div><div class="small center" style="margin-top:8px">Keep practicing to unlock next levels.</div>`;
  session.items = [];
  session.index = 0;
  renderStatus();
}

/* -------------------------
   CSV export
   ------------------------- */
function downloadCsv(){
  const answers = state.answers || [];
  const rows = [];
  rows.push(['timestamp','student','level','sdg','id','word','choice','result']);
  for (const a of answers){
    rows.push([a.ts||'', a.student||'', a.level||'', String(a.sdg||''), a.id||'', a.word||'', a.choice||'', (a.correct ? 'correct' : 'wrong')]);
  }
  const csv = rows.map(r => r.map(field => escapeCsv(field)).join(',')).join('\r\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'sdg_progress.csv'; document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); if(a.parentNode) a.parentNode.removeChild(a); }, 800);
}

/* -------------------------
   Toasts & confetti
   ------------------------- */
function showToast(msg, ms=2600){
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t);
  setTimeout(()=>{ if(t.parentNode) t.parentNode.removeChild(t); }, ms);
}

/* Lightweight confetti */
const confettiCanvas = document.getElementById('confetti-canvas');
const ctx = confettiCanvas.getContext && confettiCanvas.getContext('2d');
let particles = [];
function resizeCanvas(){ confettiCanvas.width = window.innerWidth; confettiCanvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas); resizeCanvas();
function spawnConfetti(count=60){
  const colors = ['#ff0b3b','#ff7a00','#ffd100','#28c76f','#00bcd4','#0754ff','#9b59b6'];
  for (let i=0;i<count;i++){
    particles.push({
      x: window.innerWidth * 0.5 + (Math.random()*200-100),
      y: window.innerHeight * 0.15 + (Math.random()*40-20),
      vx: (Math.random()*8-4),
      vy: (Math.random()*-6 - 3),
      size: Math.random()*10+6,
      color: colors[Math.floor(Math.random()*colors.length)],
      life: Math.random()*80+60,
      rot: Math.random()*360,
      vr: Math.random()*10-5
    });
  }
  if (!confettiRunning) runConfetti();
}
let confettiRunning = false;
function runConfetti(){
  if (!ctx) return;
  confettiRunning = true;
  function loop(){
    ctx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
    for (let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.rot += p.vr; p.life--;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180); ctx.fillStyle=p.color; ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6); ctx.restore();
      if (p.y > confettiCanvas.height+50 || p.life <= 0) particles.splice(i,1);
    }
    if (particles.length>0) requestAnimationFrame(loop);
    else { confettiRunning=false; ctx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height); }
  }
  requestAnimationFrame(loop);
}
function triggerConfetti(){ spawnConfetti(90); }
