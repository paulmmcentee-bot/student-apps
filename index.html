<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>SDG Tourism Vocab — Mobile (Icons + Confetti)</title>
<style>
  :root{--bg:#fcfdff;--card:#fff;--accent:#0b84ff;--muted:#6b7280}
  html,body{height:100%;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Segoe UI",Roboto,Arial;background:var(--bg);color:#07203a}
  .app{max-width:720px;margin:0 auto;padding:18px}
  header{display:flex;justify-content:space-between;align-items:center;gap:12px}
  h1{font-size:18px;margin:0}
  .lead{font-size:13px;color:var(--muted);margin:6px 0 14px}
  .controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  select,button{font-size:16px;padding:10px 12px;border-radius:12px;border:1px solid #e6eefc;background:#fff;min-height:44px}
  button.primary{background:var(--accent);color:#fff;border:none}
  .card{background:var(--card);border-radius:14px;padding:12px;box-shadow:0 6px 18px rgba(6,22,48,0.06);margin-bottom:12px}
  .center{text-align:center}
  .big{font-size:22px;font-weight:700}
  .art{width:72px;height:72px;margin-bottom:8px}
  .jp{color:#0b6b4f;font-weight:700;margin-top:8px}
  .sentence{font-size:13px;color:var(--muted);margin-top:6px}
  .actions{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
  .option{display:block;padding:12px;border-radius:12px;border:1px solid #eef6ff;background:#fff;font-size:16px;text-align:left}
  .correct{background:#e6ffef;border-color:#bdeecf}
  .wrong{background:#fff0f2;border-color:#ffc9d1}
  .small{font-size:13px;color:var(--muted)}
  .langToggle{display:flex;gap:6px}
  .langToggle button{padding:6px 8px;border-radius:6px;font-size:13px}
  .sdg-icon{width:28px;height:28px;vertical-align:middle;margin-right:8px}
  .pos-row{display:flex;align-items:center;gap:8px;justify-content:center}
  footer{font-size:12px;color:var(--muted);text-align:center;margin-top:12px}
  button, .option { -webkit-tap-highlight-color: rgba(0,0,0,0); }
  @media (max-width:420px){ .art{width:60px;height:60px} select,button{font-size:15px;padding:10px} }
  /* confetti canvas sits above app */
  #confetti-canvas{position:fixed;left:0;top:0;right:0;bottom:0;pointer-events:none;z-index:9999}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<div class="app">
  <header>
    <div>
      <h1 id="title">SDG Tourism Vocab — Mobile</h1>
      <div class="lead" id="lead">Short, fun practice for tourism students (A2→C2). Tap a card to reveal translation & example.</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px">
      <button id="enBtn">EN</button>
      <button id="jaBtn">日本語</button>
    </div>
  </header>

  <div class="card">
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <select id="levelSelect" aria-label="CEFR level">
        <option value="A2">A2</option><option value="B1">B1</option><option value="B2">B2</option><option value="C1">C1</option><option value="C2">C2</option>
      </select>
      <select id="sdgSelect" aria-label="SDG"><option value="all">All SDGs</option></select>
      <select id="modeSelect" aria-label="Mode">
        <option value="flashcard">Flashcards</option>
        <option value="quiz">Quick Quiz (5)</option>
      </select>
      <button id="startBtn" class="primary">Start</button>
    </div>
    <div style="margin-top:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap">
      <div class="small">XP: <strong id="xp">0</strong> &nbsp; <span id="badges"></span></div>
      <div style="display:flex;gap:8px"><button id="exportBtn">Export</button><button id="resetBtn">Reset</button></div>
    </div>
  </div>

  <div id="cardArea" class="card center" style="min-height:260px;display:flex;flex-direction:column;justify-content:center;align-items:center">
    <div id="welcome" class="center">
      <div class="big">Ready to practice?</div>
      <div class="small" style="margin-top:8px">Choose level & mode then tap Start. Tap the card to reveal translations.</div>
    </div>
  </div>

  <div class="card small" id="controls" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap">
      <div class="small" id="sessionInfo"></div>
      <div style="display:flex;gap:8px">
        <button id="prevBtn" class="btn-ghost">Prev</button>
        <button id="nextBtn" class="btn-ghost">Next</button>
        <button id="listenBtn" class="btn-ghost">🔊</button>
      </div>
    </div>
  </div>

  <footer id="footer">SDG icon = SDG number. Works offline; share the HTML file by AirDrop or LMS.</footer>
</div>

<script>
/* Final mobile app: icons + confetti.
   Confetti is lightweight canvas-based and runs when a badge is earned.
   All SVGs are inline and generated in code (no external files).
*/

/* SDG colors */

  13:'#3f7e44',14:'#0a97d9',15:'#56c02b',16:'#00689d',17:'#19486a'
};
function sdgIconSvg(sdg){
  const n=Number(sdg)||0; const c=sdgColors[n]||'#999';
  return `<svg class="sdg-icon" width="28" height="28" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <circle cx="14" cy="14" r="14" fill="${c}"></circle>
    <text x="14" y="18" text-anchor="middle" font-size="12" font-family="Arial,Helvetica,sans-serif" fill="#fff" font-weight="700">${n}</text>
  </svg>`;
}

/* map emoji to icon keys */
const emojiToKey = {
  '🏨':'hotel','🧭':'guide','🏛️':'museum','♻️':'recycle','🏖️':'beach','💧':'water','🌤️':'weather',
  '💼':'job','🎎':'festival','📜':'menu','🍱':'food','🎁':'donation','🌳':'forest','🏥':'clinic','🛣️':'road',
  '♿':'access','🔆':'solar','🗑️':'waste','🎟️':'ticket','📚':'class','👩‍💼':'female','🚻':'toilet','🪸':'coral',
  '🦺':'safety','🤝':'partner','🏕️':'eco-lodge','🎭':'cultural','🚜':'farm','🧘':'wellness','🧑‍🏫':'training',

  '👩‍🌾':'women','🚨':'emergency','🔬':'waterquality','📆':'seasonal'
};

/* function that returns inline SVG art HTML for an item (falls back to emoji char) */
function getArtHtml(item){
  if(!item || !item.img) return `<div class="art" style="display:flex;align-items:center;justify-content:center;font-size:36px">📷</div>`;
  const key = emojiToKey[item.img] || emojiToKey[item.img.replace(/\uFE0F/g,'')]; // strip variation selector
  if(key && iconSvgs[key]) return iconSvgs[key];
  // fallback show emoji
  return `<div class="art" style="display:flex;align-items:center;justify-content:center;font-size:48px">${item.img}</div>`;
}

let session = { items:[], index:0, mode:'flashcard', answers:[] };

/* Populate SDG select */
for(let i=1;i<=17;i++){ const opt = document.createElement('option'); opt.value = String(i); opt.textContent = 'SDG ' + i; sdgSelect.appendChild(opt); }

function renderStatus(){ xpEl.textContent = state.xp; badgesEl.innerHTML = state.badges.map(b=>`<span class="badge">${b}</span>`).join(' '); }
renderStatus();

/* Events */
startBtn.addEventListener('click', startSession);
prevBtn.addEventListener('click', ()=>navigate(-1));
nextBtn.addEventListener('click', ()=>navigate(1));
listenBtn.addEventListener('click', ()=>{ if(session.items.length) speak(session.items[session.index].word); });
exportBtn.addEventListener('click', ()=>downloadProgress());
resetBtn.addEventListener('click', ()=>{ if(confirm('Reset progress?')) { localStorage.removeItem(STORAGE_KEY); state={xp:0,badges:[],unlocked:["A2"],progress:{}}; renderStatus(); location.reload(); }});
enBtn.addEventListener('click', ()=>setLang('en'));
jaBtn.addEventListener('click', ()=>setLang('ja'));
cardArea.addEventListener('click', flipCard);
let touchStartX=0;
cardArea.addEventListener('touchstart', e=>{ touchStartX = e.touches[0].clientX; }, {passive:true});
cardArea.addEventListener('touchend', e=>{ const dx = e.changedTouches[0].clientX - touchStartX; if(Math.abs(dx)>60){ if(dx<0) navigate(1); else navigate(-1); } }, {passive:true});

/* Helpers */
function getWords(level, sdgFilter){
  const arr = (vocab[level]||[]).slice();
  if(sdgFilter && sdgFilter !== 'all') return arr.filter(w => String(w.sdg) === String(sdgFilter));
  return arr;
}

/* Start session */
function startSession(){
  const level = levelSelect.value;
  const sdg = sdgSelect.value;
  const mode = modeSelect.value;
  if(!state.unlocked.includes(level)){ alert(level + ' is locked. Master more words in earlier levels to unlock.'); return; }
  const pool = getWords(level, sdg);
  if(pool.length === 0){ alert('No words for that selection'); return; }
  session.mode = mode;
  session.items = shuffle(pool);
  if(mode === 'quiz') session.items = session.items.slice(0, Math.min(5, session.items.length));
  session.index = 0;
  showingBack = false;
  controls.style.display = 'block';
  showCard();
}

/* Show card */
function showCard(){
  const item = session.items[session.index];
  if(!item){ cardArea.innerHTML = '<div class="big">No items</div>'; return; }
  const sdgSvg = sdgIconSvg(item.sdg);
  const artHtml = getArtHtml(item);
  cardArea.innerHTML = `
    <div style="width:100%;padding:18px;display:flex;flex-direction:column;align-items:center">
      ${artHtml}
      <div class="big" id="word">${escapeHtml(item.word)}</div>
      <div class="pos-row small-muted" id="pos"><span>${sdgSvg}</span><span>${escapeHtml(item.pos)}</span></div>
      <div id="back" style="display:none;width:100%;margin-top:10px">
        <div class="jp" id="jp">${escapeHtml(item.jp)}</div>
        <div class="sentence" id="sentence">${escapeHtml(item.sentence)}</div>
        <div class="actions">
          <button id="knowBtn" class="primary">I know</button>
          <button id="dontBtn" class="btn-ghost">I don't</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('knowBtn')?.addEventListener('click', ()=>markKnown(item));
  document.getElementById('dontBtn')?.addEventListener('click', ()=>markDont(item));
  sessionInfo.textContent = `${session.mode.toUpperCase()} • ${session.index+1}/${session.items.length}`;
  if(session.mode === 'quiz') showQuizOptions(item);
  renderStatus();
}

/* Flip reveal */
function flipCard(){ const back = document.getElementById('back'); if(!back) return; showingBack = !showingBack; back.style.display = showingBack ? 'block' : 'none'; }

/* Pick distractor items for the quiz (same level, plausible, same pos preferred) */
function pickDistractors(level, correctItem, count){
  const pool = (vocab[level] || []).filter(i => i.id !== correctItem.id);
  // priority 1: same pos AND same sdg
  let tier1 = pool.filter(p => p.pos === correctItem.pos && p.sdg === correctItem.sdg);
  // priority 2: same pos, different sdg
  let tier2 = pool.filter(p => p.pos === correctItem.pos && p.sdg !== correctItem.sdg);
  // priority 3: different pos (fallback)
  let tier3 = pool.filter(p => p.pos !== correctItem.pos);
  // merge in priority order, deduplicate by id
  const ordered = [...tier1, ...tier2, ...tier3];
  const uniq = [...new Map(ordered.map(c => [c.id, c])).values()];
  // exclude any candidate whose def is identical to the correct item's def
  const correctDef = correctItem.def || '';
  const valid = uniq.filter(c => c.def && c.def !== correctDef);
  return shuffle(valid).slice(0, count);
}

/* Quiz options */
function showQuizOptions(item){
  const level = item.id.split('_')[0];
  const distractors = pickDistractors(level, item, 3);
  const opts = shuffle([item, ...distractors]).slice(0, Math.min(4, (vocab[level]||[]).length));
  const optWrap = document.createElement('div'); optWrap.style.width='100%'; optWrap.style.marginTop='12px';
  optWrap.innerHTML = opts.map((o)=>`<button class="option" data-id="${o.id}">${escapeHtml(o.def)}</button>`).join('');
  cardArea.appendChild(optWrap);
  optWrap.querySelectorAll('.option').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const chosenId = btn.getAttribute('data-id');
      if(chosenId === item.id){ btn.classList.add('correct'); state.xp += 10; recordProgress(item, true); } else { btn.classList.add('wrong'); recordProgress(item, false); }
      setTimeout(()=>{ session.index++; if(session.index >= session.items.length) finishSession(); else showCard(); }, 700);
    });
  });
}

/* Progress & mastery */
function markKnown(item){
  const p = state.progress[item.id] || {known:0,seen:0,mastered:false};
  p.seen = (p.seen||0)+1; p.known = (p.known||0)+1;
  if(p.known >= 2) p.mastered = true;
  state.progress[item.id] = p; state.xp += 5; const newlyAwarded = awardIfNeeded(item); saveState();
  if(newlyAwarded) triggerConfetti();
  session.index++; if(session.index >= session.items.length) finishSession(); else showCard();
}
function markDont(item){
  const p = state.progress[item.id] || {known:0,seen:0,mastered:false};
  p.seen = (p.seen||0)+1; p.known = 0; p.mastered = false;
  state.progress[item.id] = p; saveState();
  session.index++; if(session.index >= session.items.length) finishSession(); else showCard();
}
function recordProgress(item, correct){
  const p = state.progress[item.id] || {known:0,seen:0,mastered:false};
  p.seen = (p.seen||0)+1; if(correct) p.known = (p.known||0)+1;
  if(p.known >= 2) p.mastered = true;
  state.progress[item.id] = p; const newlyAwarded = awardIfNeeded(item); saveState();
  if(newlyAwarded) triggerConfetti();
}

/* Award badge & unlock next level at 50% mastery
   Returns true if a new badge was awarded (so we can trigger confetti)
*/
function awardIfNeeded(item){
  const level = item.id.split('_')[0];
  const words = vocab[level] || [];
  const mastered = words.filter(w => state.progress[w.id] && state.progress[w.id].mastered).length;
  const pct = words.length ? (mastered / words.length) : 0;
  if(pct >= 0.5 && !state.badges.includes(level)){
    state.badges.push(level);
    const order = ["A2","B1","B2","C1","C2"]; const idx = order.indexOf(level);
    if(idx >=0 && idx < order.length-1){ const next = order[idx+1]; if(!state.unlocked.includes(next)) state.unlocked.push(next); alert(`${level} badge earned! ${next} unlocked.`); }
    else alert(`${level} badge earned!`);
    return true;
  }
  return false;
}

/* Finish session */
function finishSession(){ alert('Session complete — great work!'); controls.style.display='none'; saveState(); cardArea.innerHTML = `<div class="big center">Nice! 🎉</div><div class="small center">Keep practicing to unlock next levels.</div>`; }

/* Save/load/export */
function saveState(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); renderStatus(); }catch(e){ console.warn(e); } }
function downloadProgress(){ const filename='sdg_progress.json'; const data = JSON.stringify(state,null,2); const a=document.createElement('a'); a.href='data:application/json;charset=utf-8,'+encodeURIComponent(data); a.download=filename; a.click(); }

/* TTS */
function speak(text){
  if(!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text); u.lang='en-US'; u.rate = (levelSelect.value==='A2')?0.85:1.05; window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
}

/* Navigation & utils */
function navigate(delta){ if(!session.items.length) return; session.index = Math.min(Math.max(0, session.index+delta), session.items.length-1); showCard(); }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function escapeHtml(s){ if(!s) return ''; return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* Language toggle */

setLang(localStorage.getItem('sdg_lang')||'en');
enBtn.addEventListener('click', ()=>{ setLang('en'); localStorage.setItem('sdg_lang','en'); });
jaBtn.addEventListener('click', ()=>{ setLang('ja'); localStorage.setItem('sdg_lang','ja'); });

/* ---------- Confetti implementation (lightweight) ---------- */
const confettiCanvas = document.getElementById('confetti-canvas');
const ctx = confettiCanvas.getContext('2d');
let confettiParticles = [];
let confettiRunning = false;
function resizeConfetti(){
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeConfetti);
resizeConfetti();

function random(min, max){ return Math.random()*(max-min)+min; }

function spawnConfetti(x, y, count=60){
  const colors = ['#ff0b3b','#ff7a00','#ffd100','#28c76f','#00bcd4','#0754ff','#9b59b6'];
  for(let i=0;i<count;i++){
    confettiParticles.push({
      x: x + random(-40,40),
      y: y + random(-20,20),
      vx: random(-4,4),
      vy: random(-8,-3),
      size: random(6,12),
      color: colors[Math.floor(random(0,colors.length))],
      rot: random(0,360),
      vr: random(-10,10),
      life: random(60,120)
    });
  }
  if(!confettiRunning) runConfetti();
}

function runConfetti(){
  confettiRunning = true;
  function loop(){
    ctx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
    for(let i=confettiParticles.length-1;i>=0;i--){
      const p = confettiParticles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.25; // gravity
      p.rot += p.vr;
      p.life--;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6);
      ctx.restore();
      if(p.y > confettiCanvas.height + 50 || p.life <= 0) confettiParticles.splice(i,1);
    }
    if(confettiParticles.length > 0) requestAnimationFrame(loop);
    else { confettiRunning = false; ctx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height); }
  }
  requestAnimationFrame(loop);
}

/* Public trigger */
function triggerConfetti(){
  // spawn from center-top
  const x = window.innerWidth * 0.5;
  const y = window.innerHeight * 0.18;
  spawnConfetti(x, y, 80);
}

/* initial save */
saveState();
</script>
